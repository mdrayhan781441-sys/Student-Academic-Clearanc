<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%" style="background-color: #f8fafc; font-family: 'Arial', sans-serif;">
  <defs>
    <!-- Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <!-- Connector Marker (Crow's foot / Many) -->
    <marker id="crow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 5 5 L 0 8 M 5 5 L 10 5" fill="none" stroke="#4a5568" stroke-width="1.5"/>
    </marker>
    <!-- Connector Marker (One) -->
    <marker id="one" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 5 1 L 5 9 M 2 1 L 2 9" fill="none" stroke="#4a5568" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a365d">ENTITY-RELATIONSHIP (ER) DIAGRAM</text>
  <text x="500" y="55" text-anchor="middle" font-size="12" fill="#718096">Student Academic Clearance Database Schema (InnoDB)</text>

  <!-- ================= ENTITIES (TABLES) ================= -->

  <!-- 1. DEPARTMENTS (X: 30, Y: 100) -->
  <g transform="translate(40, 120)" filter="url(#shadow)">
    <rect width="180" height="100" rx="6" fill="#ffffff" stroke="#cbd5e0" stroke-width="1"/>
    <rect width="180" height="30" rx="6" fill="#1a365d"/>
    <rect width="180" height="10" y="20" fill="#1a365d"/> <!-- Fix border radius overlap -->
    <text x="90" y="20" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">departments</text>
    <text x="10" y="50" font-size="11" font-weight="bold" fill="#2d3748">id (PK)</text>
    <text x="150" y="50" font-size="10" fill="#718096">INT</text>
    <text x="10" y="70" font-size="11" fill="#2d3748">name</text>
    <text x="150" y="70" font-size="10" fill="#718096">VARCHAR</text>
    <text x="10" y="90" font-size="11" fill="#2d3748">code</text>
    <text x="150" y="90" font-size="10" fill="#718096">VARCHAR</text>
  </g>

  <!-- 2. ADMINS (X: 40, Y: 320) -->
  <g transform="translate(40, 340)" filter="url(#shadow)">
    <rect width="180" height="140" rx="6" fill="#ffffff" stroke="#cbd5e0" stroke-width="1"/>
    <rect width="180" height="30" rx="6" fill="#1a365d"/>
    <rect width="180" height="10" y="20" fill="#1a365d"/>
    <text x="90" y="20" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">admins</text>
    <text x="10" y="50" font-size="11" font-weight="bold" fill="#2d3748">id (PK)</text>
    <text x="150" y="50" font-size="10" fill="#718096">INT</text>
    <text x="10" y="70" font-size="11" fill="#2d3748">username</text>
    <text x="150" y="70" font-size="10" fill="#718096">VARCHAR</text>
    <text x="10" y="90" font-size="11" fill="#2d3748">password</text>
    <text x="150" y="90" font-size="10" fill="#718096">VARCHAR</text>
    <text x="10" y="110" font-size="11" fill="#2d3748">role</text>
    <text x="150" y="110" font-size="10" fill="#718096">ENUM</text>
    <text x="10" y="130" font-size="11" font-style="italic" fill="#2b6cb0">department_id (FK)</text>
    <text x="150" y="130" font-size="10" fill="#718096">INT</text>
  </g>

  <!-- 3. STUDENTS (X: 380, Y: 100) -->
  <g transform="translate(380, 100)" filter="url(#shadow)">
    <rect width="200" height="220" rx="6" fill="#ffffff" stroke="#cbd5e0" stroke-width="1"/>
    <rect width="200" height="30" rx="6" fill="#1a365d"/>
    <rect width="200" height="10" y="20" fill="#1a365d"/>
    <text x="100" y="20" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">students</text>
    <text x="10" y="50" font-size="11" font-weight="bold" fill="#2d3748">id (PK)</text>
    <text x="160" y="50" font-size="10" fill="#718096">INT</text>
    <text x="10" y="70" font-size="11" fill="#2d3748">student_id (UK)</text>
    <text x="160" y="70" font-size="10" fill="#718096">VARCHAR</text>
    <text x="10" y="90" font-size="11" fill="#2d3748">name</text>
    <text x="160" y="90" font-size="10" fill="#718096">VARCHAR</text>
    <text x="10" y="110" font-size="11" fill="#2d3748">email</text>
    <text x="160" y="110" font-size="10" fill="#718096">VARCHAR</text>
    <text x="10" y="130" font-size="11" fill="#2d3748">phone</text>
    <text x="160" y="130" font-size="10" fill="#718096">VARCHAR</text>
    <text x="10" y="150" font-size="11" fill="#2d3748">cgpa</text>
    <text x="160" y="150" font-size="10" fill="#718096">DECIMAL</text>
    <text x="10" y="170" font-size="11" fill="#2d3748">status</text>
    <text x="160" y="170" font-size="10" fill="#718096">ENUM</text>
    <text x="10" y="190" font-size="11" font-style="italic" fill="#2b6cb0">department_id (FK)</text>
    <text x="160" y="190" font-size="10" fill="#718096">INT</text>
    <text x="10" y="210" font-size="11" fill="#2d3748">password</text>
    <text x="160" y="210" font-size="10" fill="#718096">VARCHAR</text>
  </g>

  <!-- 4. DUES (X: 740, Y: 60) -->
  <g transform="translate(740, 60)" filter="url(#shadow)">
    <rect width="180" height="120" rx="6" fill="#ffffff" stroke="#cbd5e0" stroke-width="1"/>
    <rect width="180" height="30" rx="6" fill="#1a365d"/>
    <rect width="180" height="10" y="20" fill="#1a365d"/>
    <text x="90" y="20" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">dues</text>
    <text x="10" y="50" font-size="11" font-weight="bold" fill="#2d3748">id (PK)</text>
    <text x="140" y="50" font-size="10" fill="#718096">INT</text>
    <text x="10" y="70" font-size="11" font-style="italic" fill="#2b6cb0">student_id (FK)</text>
    <text x="140" y="70" font-size="10" fill="#718096">INT</text>
    <text x="10" y="85" font-size="11" fill="#2d3748">library_due</text>
    <text x="140" y="85" font-size="10" fill="#718096">DECIMAL</text>
    <text x="10" y="100" font-size="11" fill="#2d3748">hostel_due</text>
    <text x="140" y="100" font-size="10" fill="#718096">DECIMAL</text>
    <text x="10" y="115" font-size="11" fill="#2d3748">tuition_due</text>
    <text x="140" y="115" font-size="10" fill="#718096">DECIMAL</text>
  </g>

  <!-- 5. PAYMENTS (X: 740, Y: 210) -->
  <g transform="translate(740, 210)" filter="url(#shadow)">
    <rect width="180" height="140" rx="6" fill="#ffffff" stroke="#cbd5e0" stroke-width="1"/>
    <rect width="180" height="30" rx="6" fill="#1a365d"/>
    <rect width="180" height="10" y="20" fill="#1a365d"/>
    <text x="90" y="20" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">payments</text>
    <text x="10" y="50" font-size="11" font-weight="bold" fill="#2d3748">id (PK)</text>
    <text x="140" y="50" font-size="10" fill="#718096">INT</text>
    <text x="10" y="70" font-size="11" font-style="italic" fill="#2b6cb0">student_id (FK)</text>
    <text x="140" y="70" font-size="10" fill="#718096">INT</text>
    <text x="10" y="90" font-size="11" fill="#2d3748">library_paid</text>
    <text x="140" y="90" font-size="10" fill="#718096">DECIMAL</text>
    <text x="10" y="105" font-size="11" fill="#2d3748">hostel_paid</text>
    <text x="140" y="105" font-size="10" fill="#718096">DECIMAL</text>
    <text x="10" y="120" font-size="11" fill="#2d3748">tuition_paid</text>
    <text x="140" y="120" font-size="10" fill="#718096">DECIMAL</text>
  </g>

  <!-- 6. CLEARANCE_REQUESTS (X: 380, Y: 390) -->
  <g transform="translate(380, 390)" filter="url(#shadow)">
    <rect width="200" height="200" rx="6" fill="#ffffff" stroke="#cbd5e0" stroke-width="1"/>
    <rect width="200" height="30" rx="6" fill="#1a365d"/>
    <rect width="200" height="10" y="20" fill="#1a365d"/>
    <text x="100" y="20" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">clearance_requests</text>
    <text x="10" y="50" font-size="11" font-weight="bold" fill="#2d3748">id (PK)</text>
    <text x="160" y="50" font-size="10" fill="#718096">INT</text>
    <text x="10" y="70" font-size="11" font-style="italic" fill="#2b6cb0">student_id (FK)</text>
    <text x="160" y="70" font-size="10" fill="#718096">INT</text>
    <text x="10" y="90" font-size="11" fill="#2d3748">message</text>
    <text x="160" y="90" font-size="10" fill="#718096">TEXT</text>
    <text x="10" y="110" font-size="11" fill="#2d3748">status</text>
    <text x="160" y="110" font-size="10" fill="#718096">ENUM</text>
    <text x="10" y="130" font-size="11" fill="#2d3748">admin_action</text>
    <text x="160" y="130" font-size="10" fill="#718096">VARCHAR</text>
    <text x="10" y="150" font-size="11" fill="#2d3748">super_admin_action</text>
    <text x="160" y="150" font-size="10" fill="#718096">VARCHAR</text>
    <text x="10" y="170" font-size="11" fill="#2d3748">document_path</text>
    <text x="160" y="170" font-size="10" fill="#718096">VARCHAR</text>
  </g>

  <!-- 7. BOOK_LOANS (X: 740, Y: 390) -->
  <g transform="translate(740, 390)" filter="url(#shadow)">
    <rect width="180" height="140" rx="6" fill="#ffffff" stroke="#cbd5e0" stroke-width="1"/>
    <rect width="180" height="30" rx="6" fill="#1a365d"/>
    <rect width="180" height="10" y="20" fill="#1a365d"/>
    <text x="90" y="20" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">book_loans</text>
    <text x="10" y="50" font-size="11" font-weight="bold" fill="#2d3748">id (PK)</text>
    <text x="140" y="50" font-size="10" fill="#718096">INT</text>
    <text x="10" y="70" font-size="11" font-style="italic" fill="#2b6cb0">student_id (FK)</text>
    <text x="140" y="70" font-size="10" fill="#718096">INT</text>
    <text x="10" y="90" font-size="11" font-style="italic" fill="#2b6cb0">book_id (FK)</text>
    <text x="140" y="90" font-size="10" fill="#718096">INT</text>
    <text x="10" y="110" font-size="11" fill="#2d3748">status</text>
    <text x="140" y="110" font-size="10" fill="#718096">ENUM</text>
    <text x="10" y="130" font-size="11" fill="#2d3748">due_date</text>
    <text x="140" y="130" font-size="10" fill="#718096">TIMESTAMP</text>
  </g>

  <!-- 8. BOOKS (X: 740, Y: 550) -->
  <g transform="translate(740, 550)" filter="url(#shadow)">
    <rect width="180" height="85" rx="6" fill="#ffffff" stroke="#cbd5e0" stroke-width="1"/>
    <rect width="180" height="30" rx="6" fill="#1a365d"/>
    <rect width="180" height="10" y="20" fill="#1a365d"/>
    <text x="90" y="20" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">books</text>
    <text x="10" y="50" font-size="11" font-weight="bold" fill="#2d3748">id (PK)</text>
    <text x="140" y="50" font-size="10" fill="#718096">INT</text>
    <text x="10" y="70" font-size="11" fill="#2d3748">title</text>
    <text x="140" y="70" font-size="10" fill="#718096">VARCHAR</text>
  </g>

  <!-- ================= RELATIONS (CONNECTORS) ================= -->

  <!-- Departments (1) to Students (N) -->
  <path d="M 220,170 C 300,170 300,200 372,200" fill="none" stroke="#4a5568" stroke-width="1.5"
        marker-start="url(#one)" marker-end="url(#crow)"/>
        
  <!-- Departments (1) to Admins (N) -->
  <path d="M 130,220 L 130,332" fill="none" stroke="#4a5568" stroke-width="1.5"
        marker-start="url(#one)" marker-end="url(#crow)"/>

  <!-- Students (1) to Dues (1) -->
  <path d="M 580,110 L 732,110" fill="none" stroke="#4a5568" stroke-width="1.5"
        marker-start="url(#one)" marker-end="url(#one)"/>

  <!-- Students (1) to Payments (1) -->
  <path d="M 580,240 L 732,240" fill="none" stroke="#4a5568" stroke-width="1.5"
        marker-start="url(#one)" marker-end="url(#one)"/>

  <!-- Students (1) to Clearance Requests (N) -->
  <path d="M 480,320 L 480,382" fill="none" stroke="#4a5568" stroke-width="1.5"
        marker-start="url(#one)" marker-end="url(#crow)"/>

  <!-- Students (1) to Book Loans (N) -->
  <path d="M 540,320 C 540,430 680,430 732,430" fill="none" stroke="#4a5568" stroke-width="1.5"
        marker-start="url(#one)" marker-end="url(#crow)"/>

  <!-- Books (1) to Book Loans (N) -->
  <path d="M 830,550 L 830,538" fill="none" stroke="#4a5568" stroke-width="1.5"
        marker-start="url(#one)" marker-end="url(#crow)"/>

</svg>
